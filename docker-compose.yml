services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: flowplan
      POSTGRES_PASSWORD: flowplan
      POSTGRES_DB: flowplan
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U flowplan']
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://flowplan:flowplan@db:5432/flowplan
      SESSION_SECRET: ${SESSION_SECRET:-change-me-to-a-secure-random-string}
      STORAGE_PROVIDER: local
      MAX_FILE_SIZE_MB: '10'
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

volumes:
  pgdata:
  uploads:
